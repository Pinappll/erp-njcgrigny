services:
  php:
    build:
      context: ./backend
      dockerfile: ./docker/Dockerfile
    container_name: erp_php
    volumes:
      - ./backend:/var/www/html
    depends_on:
      - postgres
    environment:
      DATABASE_URL: "postgresql://erp_user:erp_pass@postgres:5432/erp_njcgrigny?serverVersion=16&charset=utf8"

  nginx:
    image: nginx:alpine
    container_name: erp_nginx
    ports:
      - "8080:80"
    volumes:
      - ./backend:/var/www/html
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - php

  postgres:
    image: postgres:16-alpine
    container_name: erp_postgres
    environment:
      POSTGRES_DB: erp_njcgrigny
      POSTGRES_USER: erp_user
      POSTGRES_PASSWORD: erp_pass
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"

  adminer:
    image: adminer
    container_name: erp_adminer
    ports:
      - "8081:8080"
    depends_on:
      - postgres

volumes:
  postgres_data:
